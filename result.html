<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
    <link rel="stylesheet" href="./assets/style/result.css">
</head>

<body>

    <section class="result">
        <div class="result__container">

            <p class="result__title">Overall score</p>
            <h1 class="result__score">8.0</h1>

            <p class="result__date">
                14-Jul-24 IELTS on Computer General Training
            </p>

            <div class="result__grid">
                <div class="result__card">
                    <p>Listening</p>
                    <span>8.0</span>
                </div>

                <div class="result__card">
                    <p>Reading</p>
                    <span>8.5</span>
                </div>

                <div class="result__card">
                    <p>Writing</p>
                    <span>7.0</span>
                </div>

                <div class="result__card">
                    <p>Speaking</p>
                    <span>7.5</span>
                </div>
            </div>

        </div>
    </section>

</body>

</html>
