<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./assets/style/flashcard-login.css">
</head>

<body>

 <div class="flashcard">
  <div class="flashcard__header">
    <div class="flashcard__title">
      <span class="icon">🃏</span>
      <h2>Flashcard Decks</h2>
      <span class="badge">33</span>
    </div>
    <p class="subtitle">Choose a topic to study</p>
  </div>

  <div class="flashcard__list">
    <div class="item">
      <span class="item__icon">💬</span>
      <span>Idioms</span>
    </div>

    <div class="item">
      <span class="item__icon">💻</span>
      <span>Digital Frontier</span>
    </div>

    <div class="item">
      <span class="item__icon">❓</span>
      <span>Short Questions</span>
    </div>

    <div class="item">
      <span class="item__icon">👤</span>
      <span>Personal Intro</span>
    </div>

    <div class="item">
      <span class="item__icon">⏱</span>
      <span>Present Tenses</span>
    </div>

    <div class="item">
      <span class="item__icon">👨‍👩‍👧‍👦</span>
      <span>Family, Friends & Relationships</span>
    </div>

    <div class="item">
      <span class="item__icon">📚</span>
      <span>Education & Learning</span>
    </div>
  </div>

  <button class="flashcard__close">Close</button>
</div>

</body>

</html>
