<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grammar Tests</title>
    <link rel="stylesheet" href="./assets/style/grammar.css" />
</head>

<body>
    <div class="grammar-container">
        <div class="grammar-header">
            <h1 class="grammar-title">📚 Grammar Tests</h1>
            <p class="grammar-subtitle">Choose a grammar topic to practice</p>
        </div>

        <div class="grammar-list">
            <!-- Subjunctive Mood Item -->
            <div class="grammar-item-subjunctive">
                <div class="grammar-item-content">
                    <span class="grammar-dot"></span>
                    <span>Subjunctive Mood</span>
                </div>
            </div>

            <!-- Question & Compare Item -->
            <div class="grammar-item-questions">
                <div class="grammar-item-content">
                    <span class="grammar-dot"></span>
                    <span>Question & Compare</span>
                </div>
            </div>

            <!-- Present Tenses Item -->
            <div class="grammar-item-present">
                <div class="grammar-item-content">
                    <span class="grammar-dot"></span>
                    <span>Present Tenses Day 4</span>
                </div>
            </div>

            <!-- Gerunds vs Infinitives Item -->
            <div class="grammar-item-gerunds">
                <div class="grammar-item-content">
                    <span class="grammar-dot"></span>
                    <span>Gerunds vs Infinitives</span>
                </div>
            </div>
        </div>

        <a href="#" class="grammar-back">
            <span style="margin-right: 5px">←</span> Back to Grammar
        </a>
    </div>

    <!-- Grammar Hint -->
    <div style="
        position: fixed;
        bottom: 20px;
        right: 20px;
        color: rgba(255, 255, 255, 0.5);
        font-size: 12px;
      ">
        ✨ grammar topics with grammar classes
    </div>
</body>

</html>
