<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Primqulov</title>
    <link rel="stylesheet" href="./assets/style/style.css" />
    <link rel="stylesheet" href="./assets/style/login.css" />
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>

  <body>
    <!-- Background Video -->
    <video autoplay muted loop playsinline class="background-video">
      <source src="./assets/video/video.mp4" type="video/mp4" />
    </video>

    <div class="login-container">
      <div class="login-card">
        <div class="login-avatar">
          <img src="./assets/img/logo-header.jpg" alt="img" />
        </div>
        <h2>Welcome</h2>
        <p>Sign in to continue your learning journey</p>

        <!-- Google Sign-In Button -->
        <div
          id="g_id_onload"
          data-client_id="965252598505-pd7ta3lstln3n0dm6cqf7fodbkkpom6j.apps.googleusercontent.com"
          data-callback="handleCredentialResponse"
          data-auto_prompt="false"
        ></div>

        <div
          class="g_id_signin"
          data-type="standard"
          data-size="large"
          data-theme="outline"
          data-text="continue_with"
          data-shape="pill"
        ></div>

        <div class="divider">
          <span>or</span>
        </div>

        <!-- Manual Login Form -->
        <form class="login-form" id="loginForm">
          <div>
            <label>Familiya (Surname)</label>
            <input type="text" id="surname" placeholder="Aliyev" />
          </div>

          <div>
            <label>Ism (Name)</label>
            <input type="text" id="name" placeholder="Sardor" />
          </div>

          <button type="submit" class="submit-btn">Davom etish →</button>
        </form>

        <!-- Hidden div for Google user info display -->
        <div id="userInfo" class="user-info" style="display: none">
          <img id="userAvatar" class="user-avatar" src="" alt="User Avatar" />
          <div id="userName" class="user-name"></div>
          <div id="userEmail" class="user-email"></div>
        </div>
      </div>
    </div>

    <script>
      const GOOGLE_CLIENT_ID = "YOUR_CLIENT_ID.apps.googleusercontent.com";
      const REDIRECT_URI =
        window.location.origin +
        window.location.pathname.replace("login.html", "index.html");
    </script>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./assets/js/config.js"></script>
    <script src="./assets/js/login.js"></script>
  </body>
</html>
