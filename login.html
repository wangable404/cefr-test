<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Primqulov</title>
    <link rel="stylesheet" href="./assets/style/style.css">
    <link rel="stylesheet" href="./assets/style/login.css">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <!-- Background Video -->
    <video autoplay muted loop playsinline class="background-video">
        <source src="./assets/video/video.mp4" type="video/mp4">
    </video>
    
    <div class="login-container">
        <div class="login-card">
            <div class="login-avatar"><img src="./assets/img/logo-header.jpg" alt="img"></div>
            <h2>Welcome</h2>
            <p>Sign in to continue your learning journey</p>

            <!-- Google Sign-In Button -->
            <button class="google-btn" id="googleSignInBtn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>

            <div class="divider">
                <span>or</span>
            </div>

            <!-- Manual Login Form -->
            <form class="login-form" id="loginForm">
                <div>
                    <label>Familiya (Surname)</label>
                    <input type="text" id="surname" placeholder="Aliyev">
                </div>

                <div>
                    <label>Ism (Name)</label>
                    <input type="text" id="name" placeholder="Sardor">
                </div>

                <button type="submit" class="submit-btn">
                    Davom etish →
                </button>
            </form>

            <!-- Hidden div for Google user info display -->
            <div id="userInfo" class="user-info" style="display: none;">
                <img id="userAvatar" class="user-avatar" src="" alt="User Avatar">
                <div id="userName" class="user-name"></div>
                <div id="userEmail" class="user-email"></div>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_CLIENT_ID = 'YOUR_CLIENT_ID.apps.googleusercontent.com';
        const REDIRECT_URI = window.location.origin + window.location.pathname.replace('login.html', 'index.html');
    </script>

    <script src="./assets/js/login.js"></script>
</body>

</html>
