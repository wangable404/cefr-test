<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IELTS / CEFR Reading Test | Academic Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: #f1f5f9;
            color: #0a2b3e;
            padding: 30px 20px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .test-header {
            background: white;
            border-radius: 32px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.05);
            padding: 18px 28px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .step-indicator {
            background: #e2e8f0;
            padding: 6px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .timer {
            background: #0f172a;
            color: #facc15;
            font-family: monospace;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 6px 24px;
            border-radius: 60px;
            letter-spacing: 2px;
        }

        .test-type-badge {
            background: #1e466e;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .task-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .passage-area {
            background: #fefcf5;
            padding: 28px 32px;
            border-bottom: 1px solid #e9edf2;
        }

        .passage-area h2 {
            font-size: 1.7rem;
            margin-bottom: 16px;
            color: #1e466e;
            border-left: 5px solid #2c7da0;
            padding-left: 20px;
        }

        .reading-text {
            font-size: 1rem;
            line-height: 1.7;
            color: #1e2f3c;
            text-align: justify;
        }

        .reading-text p {
            margin-bottom: 1rem;
        }

        .questions-area {
            padding: 28px 32px;
        }

        .task-type-badge {
            display: inline-block;
            background: #d9e8f5;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .gap-sentence {
            background: #f8fafc;
            padding: 16px 20px;
            border-radius: 24px;
            margin-bottom: 18px;
            font-size: 0.95rem;
        }

        select, .blank-input {
            padding: 6px 14px;
            border-radius: 40px;
            border: 1.5px solid #cbd5e1;
            background: white;
            font-size: 0.9rem;
            font-family: inherit;
            margin: 0 4px;
            cursor: pointer;
        }

        .match-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
            background: #f8fafc;
            padding: 12px 18px;
            border-radius: 20px;
            margin-bottom: 12px;
        }

        .match-label {
            font-weight: 700;
            min-width: 110px;
        }

        .options-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 8px;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            background: #f8fafc;
            padding: 6px 18px;
            border-radius: 40px;
            transition: 0.1s;
        }

        .option-label:hover {
            background: #e2edf7;
        }

        input[type="radio"] {
            accent-color: #2c7da0;
            width: 17px;
            height: 17px;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 32px;
            gap: 16px;
            padding: 0 32px 28px 32px;
        }

        button {
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: #1e466e;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #0f2f4a;
            transform: scale(0.97);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #1e293b;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #cbd5e1;
        }

        .result-preview {
            background: #eef2ff;
            border-radius: 28px;
            padding: 18px 28px;
            margin-top: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .score-large {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e466e;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="test-header">
        <div class="step-indicator" id="stepIndicator">Task 1 of 4</div>
        <div class="test-type-badge" id="testTypeBadge">IELTS</div>
        <div class="timer" id="timerDisplay">30:00</div>
    </div>

    <div class="task-card" id="taskCard">
        <div class="passage-area" id="passageArea"></div>
        <div class="questions-area" id="questionsArea"></div>
        <div class="nav-buttons">
            <button id="prevBtn" class="btn-secondary" style="visibility: hidden;">◀ Previous</button>
            <button id="nextBtn" class="btn-primary">Next Task ▶</button>
        </div>
    </div>

    <div class="result-preview" id="resultPanel">
        <span id="progressMsg">✨ Complete all tasks. You have 30 minutes total. Randomised authentic tasks.</span>
        <span id="scoreBadge" style="font-weight: 700;"></span>
    </div>
</div>

<script>
    // ============================================================
    //  COMPLETELY RENEWED TASKS – IELTS / CEFR ACADEMIC STANDARDS
    //  Each task type has 5 high-quality variants.
    // ============================================================

    // ----- 1) GAP FILL (5 variants, 4 gaps each) -----
    const gapTasks = [
        {
            title: "The Shift to Electric Vehicles",
            passage: `<p>The global transition to electric vehicles (EVs) is accelerating due to climate concerns and technological advances. Lithium-ion batteries have become more efficient, but their production requires significant mining of rare earth metals, which raises environmental ___________ . Many governments offer subsidies to reduce the upfront cost, making EVs more ___________ to average consumers. However, the lack of charging infrastructure in rural areas remains a major ___________ . Experts predict that by 2035, EVs will account for over 50% of new car sales, provided that battery recycling methods improve ___________ .</p>`,
            gaps: ["___________", "___________", "___________", "___________"],
            correct: ["concerns", "accessible", "obstacle", "significantly"],
            optionsPerGap: [
                ["concerns", "benefits", "profits", "standards"],
                ["accessible", "expensive", "complicated", "dangerous"],
                ["obstacle", "advantage", "solution", "trend"],
                ["significantly", "rarely", "slightly", "temporarily"]
            ]
        },
        {
            title: "Urban Green Spaces and Wellbeing",
            passage: `<p>Parks and community gardens provide essential ecosystem services in dense cities. They reduce the urban heat island effect, improve air quality, and promote mental health by offering ___________ from noise and stress. Studies show that residents living within 300 metres of a green space report 25% lower levels of anxiety. Furthermore, these areas encourage social ___________ , which strengthens neighbourhood ties. City planners now integrate 'green corridors' to connect fragmented habitats, enhancing biodiversity while giving citizens ___________ to nature. Without sufficient funding, however, many such projects remain under ___________ .</p>`,
            gaps: ["___________", "___________", "___________", "___________"],
            correct: ["relief", "interaction", "access", "threat"],
            optionsPerGap: [
                ["relief", "pressure", "isolation", "expense"],
                ["interaction", "distance", "conflict", "competition"],
                ["access", "damage", "indifference", "pollution"],
                ["threat", "construction", "celebration", "expansion"]
            ]
        },
        {
            title: "The Psychology of Online Learning",
            passage: `<p>Digital education has transformed how knowledge is acquired, yet it poses unique psychological challenges. Without face-to-face cues, students often struggle with self-___________ , leading to procrastination. Moreover, the absence of a physical classroom can reduce a sense of ___________ , which is crucial for motivation. Effective strategies include setting micro-deadlines and participating in virtual study groups. Interestingly, introverted learners may ___________ in online environments because they feel less social pressure. Nevertheless, institutions must address digital fatigue by ___________ screen breaks into the curriculum.</p>`,
            gaps: ["___________", "___________", "___________", "___________"],
            correct: ["regulation", "belonging", "thrive", "integrating"],
            optionsPerGap: [
                ["regulation", "criticism", "expression", "doubt"],
                ["belonging", "isolation", "chaos", "formality"],
                ["thrive", "struggle", "disappear", "hesitate"],
                ["integrating", "ignoring", "reducing", "removing"]
            ]
        },
        {
            title: "Global Plastic Pollution",
            passage: `<p>Plastic waste has infiltrated the most remote corners of the planet, from Arctic ice to the Mariana Trench. Single-use items like straws and bags constitute a large ___________ of marine debris. While recycling is widely promoted, only 9% of all plastic ever produced has been recycled; the rest ends up in landfills or the environment. Microplastics, which result from the ___________ of larger items, have been found in human blood and breast milk, raising health alarms. International treaties aim to ___________ plastic production, but enforcement remains weak. Ultimately, a shift towards a circular economy is ___________ .</p>`,
            gaps: ["___________", "___________", "___________", "___________"],
            correct: ["proportion", "degradation", "curb", "imperative"],
            optionsPerGap: [
                ["proportion", "majority", "minority", "absence"],
                ["degradation", "production", "recycling", "invention"],
                ["curb", "increase", "ignore", "celebrate"],
                ["imperative", "optional", "irrelevant", "impossible"]
            ]
        },
        {
            title: "Sleep and Memory Consolidation",
            passage: `<p>Sleep plays a fundamental role in transforming short-term memories into long-term storage. During deep non-REM sleep, the hippocampus ___________ daily experiences to the neocortex, where they become integrated with existing knowledge. Chronic sleep deprivation impairs this process, leading to forgetfulness and reduced ___________ . Recent research suggests that even a 20-minute nap can boost recall of factual information. However, sleep quality matters as much as quantity: ___________ awakenings fragment the cycle and prevent the brain from completing essential memory ___________ .</p>`,
            gaps: ["___________", "___________", "___________", "___________"],
            correct: ["transfers", "cognitive", "frequent", "consolidation"],
            optionsPerGap: [
                ["transfers", "blocks", "ignores", "deletes"],
                ["cognitive", "physical", "emotional", "social"],
                ["frequent", "rare", "brief", "nocturnal"],
                ["consolidation", "destruction", "creation", "avoidance"]
            ]
        }
    ];

    // ----- 2) MATCHING HEADINGS (5 variants, 4 paragraphs each) -----
    const headingTasks = [
        {
            title: "The History of the Bicycle",
            passage: `<p><strong>Paragraph A</strong><br>The earliest form of the bicycle, called the 'Laufmaschine' or 'draisine', was invented by Karl von Drais in 1817. It had no pedals; riders pushed their feet along the ground.</p>
            <p><strong>Paragraph B</strong><br>The 1860s saw the introduction of pedals attached directly to the front wheel, leading to the 'boneshaker' – a rough ride due to iron tyres and wooden wheels.</p>
            <p><strong>Paragraph C</strong><br>The penny-farthing, with its huge front wheel, became popular in the 1870s. It allowed greater speed but was extremely dangerous because riders sat high above the ground.</p>
            <p><strong>Paragraph D</strong><br>The modern 'safety bicycle' emerged in 1885 with equal-sized wheels and a chain drive. Pneumatic tyres added comfort, sparking a global cycling boom.</p>`,
            paragraphs: ["Paragraph A", "Paragraph B", "Paragraph C", "Paragraph D"],
            correctHeadings: [
                "The pedal-less prototype",
                "First pedals and an uncomfortable ride",
                "High risk, high speed design",
                "Birth of the contemporary bicycle"
            ],
            options: [
                "The pedal-less prototype",
                "First pedals and an uncomfortable ride",
                "High risk, high speed design",
                "Birth of the contemporary bicycle",
                "Electric motors and modern materials",
                "Decline of cycling in the 20th century"
            ]
        },
        {
            title: "The Rise of the Gig Economy",
            passage: `<p><strong>Paragraph A</strong><br>Platforms like Uber, Deliveroo and Upwork have enabled millions to work as independent contractors, choosing when and where to provide services.</p>
            <p><strong>Paragraph B</strong><br>Flexibility is the main draw: workers can balance multiple jobs or care responsibilities. However, this often comes without sick pay, holiday leave or pension contributions.</p>
            <p><strong>Paragraph C</strong><br>Critics argue that gig companies misclassify employees to avoid labour laws, leading to court battles in several countries. In 2021, a UK Supreme Court ruling granted some drivers worker status.</p>
            <p><strong>Paragraph D</strong><br>Proposed solutions include portable benefits that follow the worker across platforms and collective bargaining rights for freelancers.</p>`,
            paragraphs: ["Paragraph A", "Paragraph B", "Paragraph C", "Paragraph D"],
            correctHeadings: [
                "Definition of platform-based work",
                "Trade-off between autonomy and security",
                "Legal challenges to employment classification",
                "Future reforms to protect gig workers"
            ],
            options: [
                "Definition of platform-based work",
                "Trade-off between autonomy and security",
                "Legal challenges to employment classification",
                "Future reforms to protect gig workers",
                "Historical origins of casual labour",
                "Advantages for large corporations"
            ]
        },
        {
            title: "Plastic Pollution in Oceans",
            passage: `<p><strong>Paragraph A</strong><br>Each year, an estimated 11 million metric tons of plastic enter the ocean – equivalent to a garbage truck every minute. Most originates from mismanaged waste in Southeast Asia.</p>
            <p><strong>Paragraph B</strong><br>Once in the marine environment, plastic breaks down into microplastics (<5mm), which are ingested by zooplankton, fish and eventually humans through seafood consumption.</p>
            <p><strong>Paragraph C</strong><br>Entanglement and ingestion kill over 100,000 marine mammals and one million seabirds annually. Coral reefs covered in plastic debris are 89% more likely to become diseased.</p>
            <p><strong>Paragraph D</strong><br>International initiatives like the UN Global Plastics Treaty aim to reduce production, but voluntary commitments have so far failed to reverse the trend.</p>`,
            paragraphs: ["Paragraph A", "Paragraph B", "Paragraph C", "Paragraph D"],
            correctHeadings: [
                "Scale of ocean plastic input",
                "Fragmentation and food chain contamination",
                "Lethal impact on wildlife",
                "Insufficiency of current global actions"
            ],
            options: [
                "Scale of ocean plastic input",
                "Fragmentation and food chain contamination",
                "Lethal impact on wildlife",
                "Insufficiency of current global actions",
                "Innovations in biodegradable materials",
                "Role of recycling in developed nations"
            ]
        },
        {
            title: "Emotional Intelligence at Work",
            passage: `<p><strong>Paragraph A</strong><br>Emotional intelligence (EQ) comprises self-awareness, self-regulation, empathy and social skill. Unlike IQ, EQ can be developed through training.</p>
            <p><strong>Paragraph B</strong><br>Employees with high EQ manage stress better, resolve conflicts constructively and adapt to change – qualities linked to higher performance ratings and lower burnout.</p>
            <p><strong>Paragraph C</strong><br>Leaders who demonstrate empathy create psychological safety, which encourages team members to speak up with ideas or concerns without fear of punishment.</p>
            <p><strong>Paragraph D</strong><br>Organisations now incorporate EQ assessments in hiring and offer mindfulness-based programmes to strengthen interpersonal competencies.</p>`,
            paragraphs: ["Paragraph A", "Paragraph B", "Paragraph C", "Paragraph D"],
            correctHeadings: [
                "Components and trainability of EQ",
                "Positive outcomes for employees",
                "Empathy as a leadership tool",
                "Corporate integration of EQ development"
            ],
            options: [
                "Components and trainability of EQ",
                "Positive outcomes for employees",
                "Empathy as a leadership tool",
                "Corporate integration of EQ development",
                "Criticism of emotional intelligence research",
                "Gender differences in emotional expression"
            ]
        },
        {
            title: "Evolution of Human Language",
            passage: `<p><strong>Paragraph A</strong><br>No direct fossil record of speech exists, so researchers rely on indirect evidence: brain asymmetry in hominids, the shape of the hyoid bone, and FOXP2 gene mutations.</p>
            <p><strong>Paragraph B</strong><br>One prominent theory suggests language emerged from gestural communication – manual signs that gradually became associated with vocal sounds around 100,000 years ago.</p>
            <p><strong>Paragraph C</strong><br>Another hypothesis, the 'vocal grooming' model, proposes that language replaced physical grooming as a way to maintain social bonds when group sizes grew too large for one-on-one care.</p>
            <p><strong>Paragraph D</strong><br>Most linguists now agree that no single 'first language' existed; rather, multiple languages developed independently in different regions, shaped by migration and isolation.</p>`,
            paragraphs: ["Paragraph A", "Paragraph B", "Paragraph C", "Paragraph D"],
            correctHeadings: [
                "Physical clues from ancestors",
                "Gesture-first hypothesis",
                "Social bonding replacement theory",
                "Polygenesis and regional diversification"
            ],
            options: [
                "Physical clues from ancestors",
                "Gesture-first hypothesis",
                "Social bonding replacement theory",
                "Polygenesis and regional diversification",
                "The role of written symbols",
                "Modern language families"
            ]
        }
    ];

    // ----- 3) TRUE / FALSE tasks (5 variants, 4 statements each) -----
    const tfTasks = [
        {
            title: "The Apollo Moon Landings",
            passage: `<p>The Apollo program, conducted by NASA, achieved six successful crewed landings on the Moon between 1969 and 1972. Apollo 11 was the first, with Neil Armstrong and Buzz Aldrin spending about 21 hours on the lunar surface. The missions brought back 382 kilograms of rock and soil samples, which have been studied extensively. Contrary to conspiracy claims, reflectors left on the Moon by Apollo astronauts are still used today to measure the Earth-Moon distance via lasers. The program was cancelled due to budget cuts and a shift in political priorities towards the Space Shuttle.</p>`,
            statements: [
                { text: "All Apollo missions that attempted a lunar landing were successful.", correct: "False" },
                { text: "The first moonwalk lasted less than one full day.", correct: "True" },
                { text: "Lunar retroreflectors are no longer functional.", correct: "False" },
                { text: "The cancellation of Apollo was primarily due to technical failures.", correct: "False" }
            ]
        },
        {
            title: "Myths About Introverts",
            passage: `<p>Introverts are often stereotyped as shy or antisocial, but this is inaccurate. Shyness involves fear of social judgment, whereas introversion simply means a preference for lower-stimulation environments. In fact, many introverts enjoy deep conversations and have rich social lives, just in smaller groups. Brain scans show that introverts have stronger blood flow in regions linked to internal processing, making them more sensitive to dopamine. This explains why they may feel overwhelmed by loud parties but thrive in quiet, focused work.</p>`,
            statements: [
                { text: "Introversion and shyness are the same psychological trait.", correct: "False" },
                { text: "Introverts generally dislike all forms of social interaction.", correct: "False" },
                { text: "Neurological differences between introverts and extraverts have been observed.", correct: "True" },
                { text: "Introverts tend to avoid high-arousal situations because of dopamine sensitivity.", correct: "True" }
            ]
        },
        {
            title: "Renewable Energy Reliability",
            passage: `<p>Critics argue that solar and wind power are unreliable because they depend on weather. However, modern grids combine multiple renewable sources (solar, wind, hydro, geothermal) so that when one is unavailable, another compensates. Battery storage capacity has grown exponentially, with utility-scale lithium-ion projects now able to supply power for 4-6 hours. Moreover, demand-response systems shift non-urgent electricity use to peak production times. As a result, several countries – including Denmark and Uruguay – routinely run on 90%+ renewable electricity without blackouts.</p>`,
            statements: [
                { text: "Weather dependence makes it impossible to run a grid mostly on renewables.", correct: "False" },
                { text: "Battery storage can typically cover several hours of demand.", correct: "True" },
                { text: "Demand-response programmes encourage using electricity when supply is abundant.", correct: "True" },
                { text: "No country has achieved over 80% renewable electricity reliably.", correct: "False" }
            ]
        },
        {
            title: "The Great Barrier Reef",
            passage: `<p>Located off the coast of Queensland, Australia, the Great Barrier Reef is the world's largest coral reef system, stretching over 2,300 kilometres. It has experienced three mass bleaching events since 2016 due to rising sea temperatures. Bleaching occurs when stressed corals expel their symbiotic algae, turning white. If temperatures drop quickly, corals can recover; prolonged heat leads to death. Despite this, the northern sections of the reef showed record coral cover in 2022, demonstrating resilience. Conservation efforts include reducing agricultural runoff and culling of crown-of-thorns starfish.</p>`,
            statements: [
                { text: "The Great Barrier Reef is located in the Pacific Ocean near Australia.", correct: "True" },
                { text: "All parts of the reef have suffered irreversible decline.", correct: "False" },
                { text: "Coral bleaching is always fatal for the coral colony.", correct: "False" },
                { text: "Crown-of-thorns starfish are considered a threat to the reef's health.", correct: "True" }
            ]
        },
        {
            title: "Online Learning Effectiveness",
            passage: `<p>A meta-analysis of 1,200 studies found that, on average, online learners retain 25-60% more material than traditional classroom students, partly due to self-paced learning. However, courses that simply transfer recorded lectures without interaction show no advantage. Key success factors include regular instructor feedback, collaborative projects, and gamified quizzes. Dropout rates for fully online programmes can be 10-20% higher than face-to-face, especially among students with weak time management skills. Hybrid models (blended learning) currently yield the highest outcomes.</p>`,
            statements: [
                { text: "All online courses produce better retention than face-to-face classes.", correct: "False" },
                { text: "Interaction and feedback are critical for online learning success.", correct: "True" },
                { text: "Online students never drop out more often than traditional students.", correct: "False" },
                { text: "Blended learning is considered superior to purely online or purely face-to-face.", correct: "True" }
            ]
        }
    ];

    // ----- 4) SYNONYMS tasks (5 variants, 4 words each) -----
    const synonymTasks = [
        {
            title: "Academic Vocabulary (IELTS focus)",
            passage: `<p>In academic writing, precision is paramount. Below are four common words from research contexts. Select the closest synonym for each.</p>`,
            items: [
                { word: "demonstrate", options: ["hide", "prove", "question", "ignore"], correct: "prove" },
                { word: "significant", options: ["trivial", "small", "notable", "random"], correct: "notable" },
                { word: "subsequent", options: ["previous", "initial", "following", "final"], correct: "following" },
                { word: "nevertheless", options: ["therefore", "however", "moreover", "similarly"], correct: "however" }
            ]
        },
        {
            title: "Business and Economics",
            passage: `<p>Understanding key business terms is essential for the IELTS reading section. Match each word with its synonym.</p>`,
            items: [
                { word: "incentive", options: ["penalty", "discouragement", "motivation", "obstacle"], correct: "motivation" },
                { word: "fluctuate", options: ["stabilise", "rise", "vary", "collapse"], correct: "vary" },
                { word: "viable", options: ["impossible", "workable", "complex", "risky"], correct: "workable" },
                { word: "surplus", options: ["shortage", "debt", "excess", "loss"], correct: "excess" }
            ]
        },
        {
            title: "Environment and Ecology",
            passage: `<p>Environmental science vocabulary often appears in IELTS reading passages. Choose the correct synonym.</p>`,
            items: [
                { word: "sustainable", options: ["wasteful", "temporary", "long-term", "harmful"], correct: "long-term" },
                { word: "biodiversity", options: ["species variety", "pollution", "climate", "deforestation"], correct: "species variety" },
                { word: "emissions", options: ["absorptions", "releases", "storages", "reductions"], correct: "releases" },
                { word: "depletion", options: ["renewal", "increase", "exhaustion", "protection"], correct: "exhaustion" }
            ]
        },
        {
            title: "Health and Medicine",
            passage: `<p>Medical terms frequently appear in academic reading tests. Identify the closest synonym.</p>`,
            items: [
                { word: "chronic", options: ["acute", "temporary", "persistent", "mild"], correct: "persistent" },
                { word: "contagious", options: ["curable", "infectious", "genetic", "preventable"], correct: "infectious" },
                { word: "symptom", options: ["cause", "cure", "indicator", "treatment"], correct: "indicator" },
                { word: "efficacy", options: ["ineffectiveness", "danger", "effectiveness", "cost"], correct: "effectiveness" }
            ]
        },
        {
            title: "Technology and Innovation",
            passage: `<p>Technology-related vocabulary is common in modern IELTS texts. Choose the best synonym.</p>`,
            items: [
                { word: "obsolete", options: ["modern", "outdated", "efficient", "innovative"], correct: "outdated" },
                { word: "robust", options: ["weak", "fragile", "sturdy", "complex"], correct: "sturdy" },
                { word: "simulate", options: ["ignore", "imitate", "destroy", "prevent"], correct: "imitate" },
                { word: "disruptive", options: ["supportive", "traditional", "revolutionary", "minor"], correct: "revolutionary" }
            ]
        }
    ];

    // ---- Helper functions ----
    function getRandomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function getCurrentTestType() {
        const stored = localStorage.getItem('currentTest');
        if (stored === 'IELTS') return 'IELTS';
        if (stored === 'CEFR') return 'CEFR';
        return 'IELTS';
    }

    function percentToIELTS(percent) {
        if (percent >= 95) return 9.0;
        if (percent >= 90) return 8.5;
        if (percent >= 85) return 8.0;
        if (percent >= 78) return 7.5;
        if (percent >= 70) return 7.0;
        if (percent >= 62) return 6.5;
        if (percent >= 55) return 6.0;
        if (percent >= 48) return 5.5;
        if (percent >= 40) return 5.0;
        if (percent >= 32) return 4.5;
        if (percent >= 25) return 4.0;
        return 3.5;
    }

    function percentToCEFR(percent) {
        if (percent >= 90) return "C2 (Proficient)";
        if (percent >= 75) return "C1 (Advanced)";
        if (percent >= 60) return "B2 (Upper Intermediate)";
        if (percent >= 45) return "B1 (Intermediate)";
        if (percent >= 30) return "A2 (Elementary)";
        return "A1 (Beginner)";
    }

    function saveSingleResult(testType, scoreValue, percentCorrect, totalCorrect, totalPossible) {
        const resultObj = {
            testType: testType,
            score: scoreValue,
            percent: percentCorrect,
            totalCorrect: totalCorrect,
            totalPossible: totalPossible,
            date: new Date().toISOString(),
            section: 'reading'
        };
        localStorage.setItem('readingResult', JSON.stringify(resultObj));
    }

    // ---- Global state ----
    let selectedGap, selectedHeading, selectedTF, selectedSyn;
    let currentStep = 0;
    let userAnswers = [];
    let timerSeconds = 1800;
    let timerInterval = null;
    let testFinished = false;
    let currentTestType = 'IELTS';
    let resultSaved = false;

    const passageArea = document.getElementById('passageArea');
    const questionsArea = document.getElementById('questionsArea');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const stepIndicator = document.getElementById('stepIndicator');
    const progressMsgSpan = document.getElementById('progressMsg');
    const scoreBadgeSpan = document.getElementById('scoreBadge');
    const timerDisplaySpan = document.getElementById('timerDisplay');
    const testTypeBadgeSpan = document.getElementById('testTypeBadge');

    function formatTime(sec) {
        let mins = Math.floor(sec / 60);
        let remainSec = sec % 60;
        return `${mins.toString().padStart(2,'0')}:${remainSec.toString().padStart(2,'0')}`;
    }

    function updateTimerUI() {
        timerDisplaySpan.innerText = formatTime(timerSeconds);
        if (timerSeconds <= 0 && !testFinished) autoFinishDueToTimeout();
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (!testFinished && timerSeconds > 0) {
                timerSeconds--;
                updateTimerUI();
            } else if (timerSeconds <= 0 && !testFinished) {
                clearInterval(timerInterval);
                autoFinishDueToTimeout();
            }
        }, 1000);
    }

    function autoFinishDueToTimeout() {
        if (testFinished) return;
        testFinished = true;
        if (timerInterval) clearInterval(timerInterval);
        progressMsgSpan.innerHTML = "⏰ TIME'S UP! Your answers have been submitted.";
        finishAndShowResults(true);
    }

    function initAnswers() {
        userAnswers = [];
        userAnswers.push({ type: 'gap', values: new Array(selectedGap.gaps.length).fill(null), taskData: selectedGap });
        userAnswers.push({ type: 'headings', values: new Array(selectedHeading.paragraphs.length).fill(''), taskData: selectedHeading });
        userAnswers.push({ type: 'tf', values: new Array(selectedTF.statements.length).fill(null), taskData: selectedTF });
        userAnswers.push({ type: 'syn', values: new Array(selectedSyn.items.length).fill(null), taskData: selectedSyn });
    }

    function randomizeTasks() {
        selectedGap = getRandomItem(gapTasks);
        selectedHeading = getRandomItem(headingTasks);
        selectedTF = getRandomItem(tfTasks);
        selectedSyn = getRandomItem(synonymTasks);
    }

    function renderCurrentTask() {
        if (testFinished) return;
        const task = userAnswers[currentStep];
        if (!task) return;
        stepIndicator.innerText = `Task ${currentStep+1} of 4`;
        let taskData = task.taskData;
        let passageHtml = `<h2>${taskData.title}</h2><div class="reading-text">${taskData.passage}</div>`;
        passageArea.innerHTML = passageHtml;

        let questionsHtml = `<div class="task-type-badge">${getTaskTypeName(task.type)}</div>`;
        questionsHtml += `<div style="margin-bottom: 18px;">${getInstruction(task.type)}</div>`;

        if (task.type === 'gap') {
            for (let i = 0; i < taskData.gaps.length; i++) {
                const selectedVal = task.values[i] || '';
                questionsHtml += `<div class="gap-sentence"><strong>${i+1}.</strong> 
                                    <select data-gap-idx="${i}" class="gap-select">
                                        <option value="">-- select word --</option>`;
                taskData.optionsPerGap[i].forEach(opt => {
                    questionsHtml += `<option value="${opt}" ${selectedVal === opt ? 'selected' : ''}>${opt}</option>`;
                });
                questionsHtml += `</select></div>`;
            }
        } else if (task.type === 'headings') {
            for (let i = 0; i < taskData.paragraphs.length; i++) {
                const selected = task.values[i] || '';
                questionsHtml += `<div class="match-row">
                                    <div class="match-label">${taskData.paragraphs[i]}</div>
                                    <select data-heading-idx="${i}" class="heading-select">
                                        <option value="">-- choose heading --</option>`;
                taskData.options.forEach(opt => {
                    questionsHtml += `<option value="${opt}" ${selected === opt ? 'selected' : ''}>${opt}</option>`;
                });
                questionsHtml += `</select></div>`;
            }
        } else if (task.type === 'tf') {
            taskData.statements.forEach((stmt, idx) => {
                const selected = task.values[idx];
                questionsHtml += `<div class="question-item">
                                    <div class="question-text">${idx+1}. ${stmt.text}</div>
                                    <div class="options-group">`;
                ['True', 'False'].forEach(opt => {
                    questionsHtml += `<label class="option-label">
                                        <input type="radio" name="tf_${idx}" value="${opt}" ${selected === opt ? 'checked' : ''} data-tf-idx="${idx}"> ${opt}
                                      </label>`;
                });
                questionsHtml += `</div></div>`;
            });
        } else if (task.type === 'syn') {
            taskData.items.forEach((item, idx) => {
                const selected = task.values[idx];
                questionsHtml += `<div class="question-item">
                                    <div class="question-text">📖 ${item.word}</div>
                                    <div class="options-group">`;
                item.options.forEach(opt => {
                    questionsHtml += `<label class="option-label">
                                        <input type="radio" name="syn_${idx}" value="${opt}" ${selected === opt ? 'checked' : ''} data-syn-idx="${idx}"> ${opt}
                                      </label>`;
                });
                questionsHtml += `</div></div>`;
            });
        }
        questionsArea.innerHTML = questionsHtml;
        attachEventListeners(task.type);
        updateNavButtons();
        updateProgressMessage();
    }

    function attachEventListeners(type) {
        if (type === 'gap') {
            document.querySelectorAll('.gap-select').forEach(select => {
                select.addEventListener('change', (e) => {
                    if (testFinished) return;
                    const idx = parseInt(select.getAttribute('data-gap-idx'));
                    userAnswers[currentStep].values[idx] = select.value;
                    updateProgressMessage();
                });
            });
        } else if (type === 'headings') {
            document.querySelectorAll('.heading-select').forEach(select => {
                select.addEventListener('change', (e) => {
                    if (testFinished) return;
                    const idx = parseInt(select.getAttribute('data-heading-idx'));
                    userAnswers[currentStep].values[idx] = select.value;
                    updateProgressMessage();
                });
            });
        } else if (type === 'tf') {
            const total = userAnswers[currentStep].taskData.statements.length;
            for (let i = 0; i < total; i++) {
                const radios = document.querySelectorAll(`input[name="tf_${i}"]`);
                radios.forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        if (testFinished) return;
                        if (e.target.checked) {
                            userAnswers[currentStep].values[i] = e.target.value;
                            updateProgressMessage();
                        }
                    });
                });
            }
        } else if (type === 'syn') {
            const total = userAnswers[currentStep].taskData.items.length;
            for (let i = 0; i < total; i++) {
                const radios = document.querySelectorAll(`input[name="syn_${i}"]`);
                radios.forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        if (testFinished) return;
                        if (e.target.checked) {
                            userAnswers[currentStep].values[i] = e.target.value;
                            updateProgressMessage();
                        }
                    });
                });
            }
        }
    }

    function getTaskTypeName(type) {
        if (type === 'gap') return 'GAP FILL';
        if (type === 'headings') return 'MATCHING HEADINGS';
        if (type === 'tf') return 'TRUE / FALSE';
        return 'SYNONYMS';
    }

    function getInstruction(type) {
        if (type === 'gap') return 'Select the correct word to complete each blank.';
        if (type === 'headings') return 'Match each paragraph with the most suitable heading.';
        if (type === 'tf') return 'Decide if each statement is TRUE or FALSE based on the passage.';
        return 'Choose the word closest in meaning to the given word.';
    }

    function isCurrentTaskCompleted() {
        const ans = userAnswers[currentStep].values;
        return ans.every(v => v !== null && v !== '');
    }

    function updateProgressMessage() {
        let totalAnswered = 0;
        let totalPossible = 0;
        for (let i = 0; i < userAnswers.length; i++) {
            totalPossible += userAnswers[i].values.length;
            totalAnswered += userAnswers[i].values.filter(v => v !== null && v !== '').length;
        }
        progressMsgSpan.innerHTML = `📋 Progress: ${totalAnswered} / ${totalPossible} questions answered. Time left: ${formatTime(timerSeconds)}`;
    }

    function updateNavButtons() {
        if (currentStep === 0) prevBtn.style.visibility = 'hidden';
        else prevBtn.style.visibility = 'visible';
        if (currentStep === 3) nextBtn.innerText = '🏁 Finish Test';
        else nextBtn.innerText = 'Next Task ▶';
    }

    function goNext() {
        if (testFinished) return;
        if (!isCurrentTaskCompleted()) {
            progressMsgSpan.innerHTML = '⚠️ Please complete all questions in this task before proceeding.';
            return;
        }
        if (currentStep === 3) {
            finishAndShowResults(false);
        } else {
            currentStep++;
            renderCurrentTask();
        }
    }

    function goPrev() {
        if (testFinished) return;
        if (currentStep > 0) {
            currentStep--;
            renderCurrentTask();
        }
    }

    function finishAndShowResults(timeoutFlag = false) {
        if (testFinished) return;
        testFinished = true;
        if (timerInterval) clearInterval(timerInterval);

        let totalCorrect = 0;
        let totalPossible = 0;
        // Gap
        let gapData = userAnswers[0];
        for (let i = 0; i < gapData.values.length; i++) {
            totalPossible++;
            if (gapData.values[i] === gapData.taskData.correct[i]) totalCorrect++;
        }
        // Headings
        let headData = userAnswers[1];
        for (let i = 0; i < headData.values.length; i++) {
            totalPossible++;
            if (headData.values[i] === headData.taskData.correctHeadings[i]) totalCorrect++;
        }
        // True/False
        let tfData = userAnswers[2];
        for (let i = 0; i < tfData.values.length; i++) {
            totalPossible++;
            if (tfData.values[i] === tfData.taskData.statements[i].correct) totalCorrect++;
        }
        // Synonyms
        let synData = userAnswers[3];
        for (let i = 0; i < synData.values.length; i++) {
            totalPossible++;
            if (synData.values[i] === synData.taskData.items[i].correct) totalCorrect++;
        }

        const percent = (totalCorrect / totalPossible) * 100;
        let scoreDisplay = '';
        let rawScore = null;

        if (currentTestType === 'IELTS') {
            let band = percentToIELTS(percent);
            rawScore = band.toFixed(1);
            scoreDisplay = `IELTS Band: ${rawScore}`;
        } else {
            let level = percentToCEFR(percent);
            rawScore = level;
            scoreDisplay = `CEFR Level: ${rawScore}`;
        }

        if (!resultSaved) {
            saveSingleResult(currentTestType, rawScore, percent, totalCorrect, totalPossible);
            resultSaved = true;
        }

        let timeoutMsg = timeoutFlag ? " (TIME EXPIRED)" : "";
        progressMsgSpan.innerHTML = `🎯 FINAL RESULT: ${totalCorrect} / ${totalPossible} (${Math.round(percent)}%) — ${scoreDisplay}${timeoutMsg}`;
        scoreBadgeSpan.innerHTML = `<span class="score-large">${scoreDisplay}</span>`;
        
        const detailDiv = document.createElement('div');
        detailDiv.style.marginTop = '12px';
        detailDiv.style.fontSize = '0.85rem';
        detailDiv.innerHTML = `<strong>Breakdown:</strong> Gap: ${gapData.values.filter((v,i)=> v === gapData.taskData.correct[i]).length}/${gapData.values.length} · Headings: ${headData.values.filter((v,i)=> v === headData.taskData.correctHeadings[i]).length}/${headData.values.length} · TF: ${tfData.values.filter((v,i)=> v === tfData.taskData.statements[i].correct).length}/${tfData.values.length} · Synonyms: ${synData.values.filter((v,i)=> v === synData.taskData.items[i].correct).length}/${synData.values.length}`;
        const oldDetail = document.getElementById('breakdownDetail');
        if (oldDetail) oldDetail.remove();
        detailDiv.id = 'breakdownDetail';
        document.querySelector('.result-preview').appendChild(detailDiv);
        
        document.querySelectorAll('select, input[type="radio"]').forEach(el => el.disabled = true);
        nextBtn.disabled = true;
        prevBtn.disabled = true;
    }

    function init() {
        currentTestType = getCurrentTestType();
        testTypeBadgeSpan.innerText = currentTestType === 'IELTS' ? 'IELTS Academic Reading' : 'CEFR Reading Test';
        randomizeTasks();
        initAnswers();
        startTimer();
        renderCurrentTask();
        nextBtn.addEventListener('click', goNext);
        prevBtn.addEventListener('click', goPrev);
        updateProgressMessage();
        resultSaved = false;
    }

    init();
</script>
</body>
</html>
